<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monitoring Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Server Client Monitoring</h1>
      <p class="subtitle">Rudimentaerer Empfang und Uebersicht der Agent-Daten</p>

      <section class="panel">
        <div class="panel-header">
          <h2>Hosts und Historie</h2>
          <button id="refreshButton">Neu laden</button>
        </div>

        <div class="layout">
          <aside class="hosts-column">
            <div class="section-head">
              <h3>🖥️ Host-Gruppen</h3>
              <p id="hostCount" class="count"></p>
            </div>
            <div id="hostList" class="host-list"></div>
            <div class="pager">
              <button id="hostsPrevButton" type="button">Hosts Zurueck</button>
              <button id="hostsNextButton" type="button">Hosts Weiter</button>
            </div>
          </aside>

          <section class="reports-column">
            <div class="section-head">
              <div class="title-row">
                <h3 id="selectedHostTitle">Meldungen</h3>
                <button id="editDisplayNameButton" type="button">Titel bearbeiten</button>
              </div>
              <p id="reportCount" class="count"></p>
              <p id="deliveryStats" class="count compact"></p>
            </div>

            <div class="view-tabs">
              <button id="overviewTabButton" type="button" class="tab-button active">Uebersicht</button>
              <button id="reportsTabButton" type="button" class="tab-button">Einzelmeldungen</button>
            </div>

            <div id="overviewView" class="view-section">
              <section class="alerts-panel">
                <div class="analysis-header">
                  <h4>🚨 Alerts</h4>
                  <p id="alertsSummary" class="count"></p>
                </div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>📌 Status</th>
                        <th>⚠️ Severity</th>
                        <th>📁 Mountpoint</th>
                        <th>📈 Used</th>
                        <th>🕒 Last Seen</th>
                      </tr>
                    </thead>
                    <tbody id="alertsRows"></tbody>
                  </table>
                </div>
              </section>

              <section class="analysis-panel">
                <div class="analysis-header">
                  <h4>📊 Analyse (letzte 24h)</h4>
                  <p id="analysisSummary" class="count"></p>
                </div>
                <div id="resourceCharts" class="resource-charts"></div>
                <div id="resourceTrendCards" class="resource-trend-grid"></div>
                <div class="analysis-header fs-focus-header">
                  <h4>💾 Filesystem Fokus</h4>
                  <p id="filesystemStats" class="count"></p>
                </div>
                <div id="filesystemCharts" class="filesystem-charts"></div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>📁 Mountpoint</th>
                        <th>🧪 Samples</th>
                        <th>📍 Aktuell</th>
                        <th>🔽 Min</th>
                        <th>🔼 Max</th>
                        <th>🧮 Avg</th>
                        <th>↕️ Delta</th>
                      </tr>
                    </thead>
                    <tbody id="analysisRows"></tbody>
                  </table>
                </div>
              </section>
            </div>

            <div id="reportsView" class="view-section hidden">
              <div id="reportList" class="report-list"></div>
              <div class="pager">
                <button id="reportsPrevButton" type="button">Vorherige Meldung</button>
                <button id="reportsNextButton" type="button">Naechste Meldung</button>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
  </html>
