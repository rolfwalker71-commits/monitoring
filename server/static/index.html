<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monitoring Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Server Client Monitoring</h1>
      <p class="subtitle">Rudimentaerer Empfang und Uebersicht der Agent-Daten</p>

      <section class="panel">
        <div class="panel-header">
          <h2>Hosts und Historie</h2>
          <button id="refreshButton">Neu laden</button>
        </div>

        <div class="layout">
          <aside class="hosts-column">
            <div class="section-head">
              <h3>Host-Gruppen</h3>
              <p id="hostCount" class="count"></p>
            </div>
            <div id="hostList" class="host-list"></div>
            <div class="pager">
              <button id="hostsPrevButton" type="button">Hosts Zurueck</button>
              <button id="hostsNextButton" type="button">Hosts Weiter</button>
            </div>
          </aside>

          <section class="reports-column">
            <div class="section-head">
              <h3 id="selectedHostTitle">Meldungen</h3>
              <p id="reportCount" class="count"></p>
            </div>
            <div id="reportList" class="report-list"></div>
            <div class="pager">
              <button id="reportsPrevButton" type="button">Meldungen Zurueck</button>
              <button id="reportsNextButton" type="button">Meldungen Weiter</button>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
  </html>
