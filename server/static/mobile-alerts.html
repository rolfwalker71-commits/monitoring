<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile Alerts</title>
    <link rel="stylesheet" href="/mobile-alerts.css?v=__ASSET_VERSION__" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/logo.png" />
    <meta name="theme-color" content="#0f2a3f" />
  </head>
  <body>
    <main class="mobile-shell">
      <header class="mobile-header">
        <div>
          <p class="eyebrow">Monitoring</p>
          <h1>Alerts</h1>
        </div>
        <div class="header-actions">
          <button id="testPushButton" type="button" class="ghost">Test Push</button>
          <button id="pushToggleButton" type="button" class="ghost">Push</button>
        </div>
      </header>

      <section class="toolbar">
        <button id="refreshButton" type="button">Aktualisieren</button>
        <label>
          Severity
          <select id="severityFilter">
            <option value="all">Alle</option>
            <option value="critical">Kritisch</option>
            <option value="warning">Warning</option>
          </select>
        </label>
        <label class="checkline">
          <input id="showAckToggle" type="checkbox" checked />
          Quittierte zeigen
        </label>
        <label class="checkline">
          <input id="showClosedToggle" type="checkbox" />
          Geschlossene zeigen
        </label>
      </section>

      <p id="statusLine" class="status">Lade Alerts...</p>

      <section id="alertsList" class="alerts-list" aria-live="polite"></section>
    </main>

    <script src="/mobile-alerts.js?v=__ASSET_VERSION__"></script>
  </body>
</html>
