  <main class="page">
    <section class="hero">
      <div class="eyebrow">Monitoring Agent Guide</div>
      <h1>Deployment, Update und Payload-Referenz</h1>
      <p>Diese Seite fasst zusammen, wie neue Agents installiert werden, wie bestehende Agents aktualisiert werden, wie die Datenübermittlung funktioniert, welche Parameter es gibt und welche Lizenz- bzw. HANA/SAP-Quellen die Linux- und Windows-Agents tatsächlich verwenden.</p>
      <div class="hero-grid">
        <div class="subcard ok">
                    <tr><td><code>-ServerUrl</code></td><td>Pflichtparameter. Basis-URL des Monitoring-Servers.</td></tr>
                    <tr><td><code>-ApiKey</code></td><td>Optionaler API-Key.</td></tr>
                    <tr><td><code>-AgentId</code></td><td>Explizite Agent-ID.</td></tr>
                    <tr><td><code>-DisplayName</code></td><td>Anzeigename in der UI.</td></tr>
                    <tr><td><code>-IntervalMinutes</code></td><td>Collect-Intervall, 1 bis 59.</td></tr>
                    <tr><td><code>-UpdateHours</code></td><td>Update-Intervall, 1 bis 24.</td></tr>
                    <tr><td><code>-RawBaseUrl</code></td><td>Explizite Update-Basis, sonst <code>ServerUrl/updates</code>.</td></tr>
          <p><strong>HANA-Abfragen existieren aktuell nur im Linux-Agent.</strong> Der Windows-Agent liest SAP-B1-/SQL-Server-Daten, aber keine HANA/hdbsql-Queries.</p>
        </div>
      </div>
    </section>

      <h2>Schnellübersicht</h2>
                <h3>Einzelne Skripte direkt holen</h3>
                <pre># Kernskripte direkt vom Server holen
      $base = 'https://monitoring.example.com/updates/client/windows'
      $target = 'C:\ProgramData\monitoring-agent'

      (New-Object System.Net.WebClient).DownloadFile("$base/collect_and_send.ps1", "$target\collect_and_send.ps1")
      (New-Object System.Net.WebClient).DownloadFile("$base/self_update.ps1", "$target\self_update.ps1")
      (New-Object System.Net.WebClient).DownloadFile("$base/bootstrap_agent.ps1", "$env:TEMP\bootstrap_agent.ps1")
      (New-Object System.Net.WebClient).DownloadFile("$base/install_agent.ps1", "$env:TEMP\install_agent.ps1")
      (New-Object System.Net.WebClient).DownloadFile("$base/setup_harvest_sql_user.ps1", "$target\setup_harvest_sql_user.ps1")
      (New-Object System.Net.WebClient).DownloadFile("$base/collect_and_scan_sap_tables.ps1", "$target\collect_and_scan_sap_tables.ps1")
      (New-Object System.Net.WebClient).DownloadFile("$base/bulk_update_agents.ps1", "$env:TEMP\bulk_update_agents.ps1")</pre>

                    <tr><td><code>collect_and_send.ps1</code></td><td>Metriken sammeln und Payload an den Server senden.</td></tr>
                    <tr><td><code>self_update.ps1</code></td><td>In-Place-Update der Agent-Dateien.</td></tr>
                    <tr><td><code>setup_harvest_sql_user.ps1</code></td><td>Harvest-SQL-User für SAP/SQL-Scan vorbereiten.</td></tr>
                    <tr><td><code>collect_and_scan_sap_tables.ps1</code></td><td>Separater SAP-Tabellen-Scan.</td></tr>
                    <tr><td><code>bulk_update_agents.ps1</code></td><td>Mehrere Windows-Agents aktualisieren.</td></tr>

      <div class="grid-3">
                <pre># Bestehende Installation reparieren / Kernskripte neu ziehen
      powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\bootstrap_agent.ps1 `
        -ServerUrl https://monitoring.example.com `
        -DisableJitter

      # Direktes In-Place-Update über self_update
      powershell.exe -NoProfile -ExecutionPolicy Bypass -File \
        C:\ProgramData\monitoring-agent\self_update.ps1</pre>
        <div class="subcard">
                  <li><strong>bootstrap_agent.ps1</strong> erkennt, ob bereits eine Installation existiert, und aktualisiert dann Skripte in place.</li>
                  <li>Wenn keine gültige Installation gefunden wird, zieht <strong>bootstrap_agent.ps1</strong> das aktuelle <code>install_agent.ps1</code> vom Server und installiert neu.</li>
        </div>
      </div>

      powershell.exe -NoProfile -ExecutionPolicy Bypass -File \

              <div class="subcard">
                <h3>Payload-Quellen</h3>
                <p>Der Windows-Agent füllt den SAP-B1-Teil aktuell über SQL Server und lokale SAP-Dateien, <strong>nicht</strong> über HANA / <code>hdbsql</code>.</p>
                <pre># SAP B1 Version aus XML
      C:\Program Files\SAP\SAP Business One DI API\Conf\InstallationConfigMSSQL.xml

      # Extensions
      SELECT AddOnName, Version
      FROM [SLDModel.SLDData].[dbo].[Extensions]
      ORDER BY AddOnName;

      # SARI AddOns
      SELECT AName, AddOnVer
      FROM [SBO-COMMON].[dbo].[SARI]
      ORDER BY AName;

      # Fallback-Datenbankname
      [SBOCOMMON].[dbo].[SARI]</pre>
        </div>

                <h3>Einzelne Skripte direkt holen</h3>
                <pre># Kernskripte direkt vom Server holen
      base="https://monitoring.example.com/updates/client/linux"

      curl -fsSL "$base/install_agent.sh" -o /tmp/install_agent.sh
      curl -fsSL "$base/collect_and_send.sh" -o /tmp/collect_and_send.sh
      curl -fsSL "$base/self_update.sh" -o /tmp/self_update.sh
      curl -fsSL "$base/repair_agent_conf.sh" -o /tmp/repair_agent_conf.sh

      chmod +x /tmp/install_agent.sh /tmp/collect_and_send.sh /tmp/self_update.sh /tmp/repair_agent_conf.sh</pre>

                    <tr><th>Skript</th><th>Typischer Zweck</th></tr>

                  <tbody>
                    <tr><td><code>install_agent.sh</code></td><td>Neuinstallation eines Linux-Agents.</td></tr>
                    <tr><td><code>collect_and_send.sh</code></td><td>Metriken sammeln und Payload an den Server senden.</td></tr>
                    <tr><td><code>self_update.sh</code></td><td>In-Place-Update der Agent-Dateien.</td></tr>
                    <tr><td><code>repair_agent_conf.sh</code></td><td>Fehlende Config-Werte und HANA-Defaults nachziehen.</td></tr>
                  </tbody>

              <div class="subcard">
                <h3>Bestehende Agents updaten</h3>
                <pre># Reguläres In-Place-Update
      sudo CONFIG_FILE=/etc/monitoring-agent/agent.conf \
        AGENT_VERSION_FILE=/opt/monitoring-agent/AGENT_VERSION \
        /opt/monitoring-agent/self_update.sh

      # Config reparieren / Defaults nachziehen
      sudo SERVER_URL=https://monitoring.example.com \
        /opt/monitoring-agent/repair_agent_conf.sh</pre>
                <ul>
                  <li><strong>self_update.sh</strong> lädt <code>collect_and_send.sh</code>, <code>self_update.sh</code> und <code>AGENT_VERSION</code> erneut vom Server.</li>
                  <li><strong>repair_agent_conf.sh</strong> setzt fehlende Standardwerte wie <code>HANA_SID</code>, <code>HANA_ADDONS_USER</code> und Ports nach.</li>
                </ul>

              <div class="subcard">
                <h3>Payload-Quellen</h3>
                <div class="callout"><strong>Version / Branch:</strong> Der Linux-Agent ruft <code>HDB version</code> auf, bevorzugt als <code>&lt;sid&gt;adm</code>. Die SID wird bei Bedarf aus <code>/hana/shared/&lt;SID&gt;</code> auto-detektiert.</div>
                <pre># HANA-Version
      HDB version

      # HANA AddOns (Lightweight)
      SELECT "NAME", "Version" FROM "SLDDATA"."EXTENSIONS";

      # HANA AddOns (Legacy)
      SELECT "AName", "AddOnVer" FROM "SBOCOMMON"."SARI";

      # HANA DB Memory pro Schema
      SELECT SCHEMA_NAME,
             ROUND(SUM(MEMORY_SIZE_IN_TOTAL) / 1024 / 1024 / 1024, 2) AS MEMORY_GB
      FROM M_CS_TABLES
      WHERE UPPER(SCHEMA_NAME) NOT LIKE 'SAP%'
        AND UPPER(SCHEMA_NAME) NOT IN ('SLDDATA','SBOCOMMON','LANDSCAPE')
        AND SCHEMA_NAME NOT LIKE '\_%' ESCAPE '\'
      GROUP BY SCHEMA_NAME
      HAVING SUM(MEMORY_SIZE_IN_TOTAL) &gt; 0
      ORDER BY MEMORY_GB DESC;</pre>
                <ul>
                  <li>Transport über <strong>hdbsql</strong> als <code>&lt;sid&gt;adm</code>.</li>
                  <li>Default-Credentials: <code>HARVEST</code> / konfigurierbares Passwort in <code>agent.conf</code>.</li>
                  <li>Default-Host/Port: <code>127.0.0.1:30015</code>, mit automatischer 3xx15-Port-Erkennung und lokalen Probe-Fallbacks.</li>
                </ul>
              </div>

      API_KEY="..."

      HANA_ADDONS_HOST="127.0.0.1"
      HANA_ADDONS_PORT="30015"

      PRIORITY_UPDATE_CHECK_MINUTES="60"</pre>
              </div>
            </div>

                    <tr><td>Linux</td><td><code>/var/lib/monitoring-agent/queue</code></td><td>Fehlgeschlagene Reports werden als <code>*.json</code> gespeichert und später nachgesendet.</td></tr>
                  </tbody>
                </table>

        <div class="subcard">
          <h3>Windows: keine HANA-Abfragen im Agent</h3>
          <p>Der Windows-Agent füllt den SAP-B1-Teil aktuell über SQL Server und lokale SAP-Dateien, <strong>nicht</strong> über HANA / <code>hdbsql</code>.</p>
          <pre># SAP B1 Version aus XML
C:\Program Files\SAP\SAP Business One DI API\Conf\InstallationConfigMSSQL.xml

# Extensions
SELECT AddOnName, Version
FROM [SLDModel.SLDData].[dbo].[Extensions]
ORDER BY AddOnName;

# SARI AddOns
SELECT AName, AddOnVer
FROM [SBO-COMMON].[dbo].[SARI]
ORDER BY AName;

# Fallback-Datenbankname
[SBOCOMMON].[dbo].[SARI]</pre>
          <div class="callout"><strong>Praktisch:</strong> Wenn du für Windows HANA dokumentieren willst, muss das erst implementiert werden. Die bestehenden Windows-Skripte greifen aktuell nur auf SQL-Server-/SAP-B1-Quellen zu.</div>
