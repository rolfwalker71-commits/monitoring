<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1280" viewBox="0 0 1920 1280" role="img" aria-labelledby="title desc">
  <title id="title">Blueprint technische Zeichnung - Monitoring App Prozesslandschaft</title>
  <desc id="desc">Technische Blueprint-Darstellung mit erklaerenden Callouts fuer Agent, API, Queue, Worker, Datenbank, Alerts, Mail, Remote Commands und Backup.</desc>

  <defs>
    <style>
      .bg { fill: #0c2f57; }
      .grid-major { stroke: #2d5f93; stroke-width: 1; opacity: 0.45; }
      .grid-minor { stroke: #1e4b7a; stroke-width: 0.6; opacity: 0.45; }
      .frame { fill: none; stroke: #99d5ff; stroke-width: 2; }
      .panel { fill: rgba(16, 67, 117, 0.45); stroke: #8bc7f7; stroke-width: 2; }
      .title { font: 800 44px 'Consolas', 'Courier New', monospace; fill: #dff5ff; letter-spacing: 1px; }
      .subtitle { font: 600 18px 'Consolas', 'Courier New', monospace; fill: #b9e4ff; }
      .lane { font: 700 19px 'Consolas', 'Courier New', monospace; fill: #ccedff; }
      .box { fill: rgba(10, 54, 96, 0.62); stroke: #8fd2ff; stroke-width: 2; rx: 10; ry: 10; }
      .box-title { font: 700 16px 'Consolas', 'Courier New', monospace; fill: #e4f6ff; }
      .box-text { font: 600 12px 'Consolas', 'Courier New', monospace; fill: #b9dcf6; }
      .flow { stroke: #76c7ff; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .flow-soft { stroke: #5cb2ef; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); }
      .callout { fill: rgba(6, 40, 72, 0.9); stroke: #f7d87b; stroke-width: 2; }
      .callout-title { font: 700 14px 'Consolas', 'Courier New', monospace; fill: #ffe8a6; }
      .callout-text { font: 600 12px 'Consolas', 'Courier New', monospace; fill: #f8e9bf; }
      .dim { stroke: #9fd9ff; stroke-width: 1.2; fill: none; marker-start: url(#dimStart); marker-end: url(#dimEnd); opacity: 0.9; }
      .dim-text { font: 600 11px 'Consolas', 'Courier New', monospace; fill: #bfe8ff; }
      .legend { font: 600 12px 'Consolas', 'Courier New', monospace; fill: #ccecff; }
    </style>

    <pattern id="minorGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" class="grid-minor"/>
    </pattern>
    <pattern id="majorGrid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#minorGrid)"/>
      <path d="M100 0H0V100" class="grid-major"/>
    </pattern>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#76c7ff"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5cb2ef"/>
    </marker>
    <marker id="dimStart" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8" fill="none" stroke="#9fd9ff" stroke-width="1.2"/>
    </marker>
    <marker id="dimEnd" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#9fd9ff" stroke-width="1.2"/>
    </marker>
  </defs>

  <rect width="1920" height="1280" class="bg"/>
  <rect x="0" y="0" width="1920" height="1280" fill="url(#majorGrid)"/>

  <rect x="24" y="24" width="1872" height="1232" class="frame"/>
  <rect x="24" y="24" width="1872" height="96" class="panel"/>
  <text x="56" y="78" class="title">MONITORING APP SYSTEM BLUEPRINT</text>
  <text x="56" y="106" class="subtitle">Technische Zeichnung mit Prozesserklaerungen, Datenpfaden und Betriebslogik</text>

  <rect x="40" y="140" width="1840" height="54" class="panel"/>
  <text x="56" y="174" class="legend">LEGEND: Solid arrows = primary data path | Soft arrows = supporting control path | Callouts explain engineering intent</text>

  <!-- Lanes -->
  <rect x="40" y="214" width="1840" height="174" class="panel"/>
  <text x="56" y="246" class="lane">A) AGENT DATENERFASSUNG</text>

  <rect x="40" y="398" width="1840" height="180" class="panel"/>
  <text x="56" y="430" class="lane">B) API ANNAHME + QUEUE ADMISSION</text>

  <rect x="40" y="588" width="1840" height="190" class="panel"/>
  <text x="56" y="620" class="lane">C) WORKER VERARBEITUNG + PERSISTENZ</text>

  <rect x="40" y="788" width="1840" height="206" class="panel"/>
  <text x="56" y="820" class="lane">D) OPERATIVE SERVICES</text>

  <rect x="40" y="1004" width="1840" height="236" class="panel"/>
  <text x="56" y="1036" class="lane">E) ERGEBNISSE + GOVERNANCE</text>

  <!-- Row A -->
  <rect x="74" y="270" width="290" height="94" class="box"/>
  <text x="90" y="296" class="box-title">A1 Collect Metrics</text>
  <text x="90" y="318" class="box-text">CPU, RAM, Filesystem, Network,</text>
  <text x="90" y="336" class="box-text">SAP/HANA health + context</text>

  <rect x="386" y="270" width="306" height="94" class="box"/>
  <text x="402" y="296" class="box-title">A2 Build Payload</text>
  <text x="402" y="318" class="box-text">host_uid, hostname, timestamps,</text>
  <text x="402" y="336" class="box-text">customer + site metadata</text>

  <rect x="714" y="270" width="270" height="94" class="box"/>
  <text x="730" y="296" class="box-title">A3 Live POST</text>
  <text x="730" y="318" class="box-text">POST /api/v1/agent-report</text>
  <text x="730" y="336" class="box-text">Target: low-latency ingest</text>

  <rect x="1006" y="270" width="314" height="94" class="box"/>
  <text x="1022" y="296" class="box-title">A4 Queue Fallback</text>
  <text x="1022" y="318" class="box-text">Store locally on transport error,</text>
  <text x="1022" y="336" class="box-text">retry before next fresh report</text>

  <rect x="1342" y="270" width="500" height="94" class="box"/>
  <text x="1358" y="296" class="box-title">A5 Queue Replay Hardening</text>
  <text x="1358" y="318" class="box-text">Malformed/empty/4xx queue files are quarantined,</text>
  <text x="1358" y="336" class="box-text">transient failures stop flush to preserve retriable data.</text>

  <!-- Row B -->
  <rect x="74" y="456" width="280" height="102" class="box"/>
  <text x="90" y="482" class="box-title">B1 Input Validation</text>
  <text x="90" y="504" class="box-text">Schema sanity, mandatory keys,</text>
  <text x="90" y="522" class="box-text">filesystem array consistency</text>

  <rect x="376" y="456" width="312" height="102" class="box"/>
  <text x="392" y="482" class="box-title">B2 Auth + Host Identity</text>
  <text x="392" y="504" class="box-text">API key + grace mode checks,</text>
  <text x="392" y="522" class="box-text">host_uid mapping + fallback logic</text>

  <rect x="710" y="456" width="286" height="102" class="box"/>
  <text x="726" y="482" class="box-title">B3 Queue Admission</text>
  <text x="726" y="504" class="box-text">Insert into agent_ingest_queue</text>
  <text x="726" y="522" class="box-text">record ingest timestamps</text>

  <rect x="1018" y="456" width="274" height="102" class="box"/>
  <text x="1034" y="482" class="box-title">B4 Fast ACK 202</text>
  <text x="1034" y="504" class="box-text">Return queue_id quickly,</text>
  <text x="1034" y="522" class="box-text">offload heavy work to worker</text>

  <rect x="1314" y="456" width="528" height="102" class="box"/>
  <text x="1330" y="482" class="box-title">B5 Worker Intake Policy</text>
  <text x="1330" y="504" class="box-text">FIFO, attempts, retry_delay_seconds, queue_wait_ms,</text>
  <text x="1330" y="522" class="box-text">end_to_end_ms for observability and SLO analysis</text>

  <!-- Row C -->
  <rect x="74" y="648" width="300" height="110" class="box"/>
  <text x="90" y="674" class="box-title">C1 Transaction Start</text>
  <text x="90" y="696" class="box-text">Open DB transaction, isolate</text>
  <text x="90" y="714" class="box-text">unit of work per payload</text>

  <rect x="396" y="648" width="312" height="110" class="box"/>
  <text x="412" y="674" class="box-title">C2 Reports Insert</text>
  <text x="412" y="696" class="box-text">Persist canonical report row</text>
  <text x="412" y="714" class="box-text">with uid + received_at_utc</text>

  <rect x="730" y="648" width="306" height="110" class="box"/>
  <text x="746" y="674" class="box-title">C3 Alert Lifecycle</text>
  <text x="746" y="696" class="box-text">Evaluate thresholds, update</text>
  <text x="746" y="714" class="box-text">open/ack/resolved states</text>

  <rect x="1058" y="648" width="348" height="110" class="box"/>
  <text x="1074" y="674" class="box-title">C4 Pruning Strategy</text>
  <text x="1074" y="696" class="box-text">Retention days + max reports,</text>
  <text x="1074" y="714" class="box-text">host_uid scoped with hostname fallback</text>

  <rect x="1428" y="648" width="414" height="110" class="box"/>
  <text x="1444" y="674" class="box-title">C5 Commit or Retry</text>
  <text x="1444" y="696" class="box-text">Commit on success; rollback on error,</text>
  <text x="1444" y="714" class="box-text">queue item remains for replay</text>

  <!-- Row D -->
  <rect x="74" y="846" width="286" height="128" class="box"/>
  <text x="90" y="872" class="box-title">D1 Mail Dispatch</text>
  <text x="90" y="894" class="box-text">Instant + reminder + digest</text>
  <text x="90" y="912" class="box-text">driven by alert transitions</text>

  <rect x="382" y="846" width="300" height="128" class="box"/>
  <text x="398" y="872" class="box-title">D2 OAuth Management</text>
  <text x="398" y="894" class="box-text">Connect callback, token refresh,</text>
  <text x="398" y="912" class="box-text">disconnect + status reporting</text>

  <rect x="704" y="846" width="312" height="128" class="box"/>
  <text x="720" y="872" class="box-title">D3 Remote Commands</text>
  <text x="720" y="894" class="box-text">Server queue -> agent poll -> exec,</text>
  <text x="720" y="912" class="box-text">result + telemetry feedback</text>

  <rect x="1038" y="846" width="300" height="128" class="box"/>
  <text x="1054" y="872" class="box-title">D4 Backup/Restore</text>
  <text x="1054" y="894" class="box-text">Auto backups, restore guardrails,</text>
  <text x="1054" y="912" class="box-text">operational continuity</text>

  <rect x="1360" y="846" width="482" height="128" class="box"/>
  <text x="1376" y="872" class="box-title">D5 UI + API Consumption</text>
  <text x="1376" y="894" class="box-text">Host cards, report timelines, trend analytics,</text>
  <text x="1376" y="912" class="box-text">alerts table, exports, admin controls</text>

  <!-- Row E -->
  <rect x="74" y="1062" width="878" height="160" class="box"/>
  <text x="90" y="1090" class="box-title">E1 Technischer Nutzen</text>
  <text x="90" y="1114" class="box-text">Asynchrone Aufnahme entkoppelt Sender und Verarbeitung.</text>
  <text x="90" y="1134" class="box-text">Queue + Retry + Quarantine minimieren Datenverlust und Staus.</text>
  <text x="90" y="1154" class="box-text">Transaktionaler DB-Pfad garantiert konsistente Report/Alert-Zustaende.</text>

  <rect x="974" y="1062" width="868" height="160" class="box"/>
  <text x="990" y="1090" class="box-title">E2 Betriebs- und Business-Nutzen</text>
  <text x="990" y="1114" class="box-text">Schnelle Sichtbarkeit ueber Endpoint-Gesundheit und Kapazitaeten.</text>
  <text x="990" y="1134" class="box-text">Automatisierte Benachrichtigung + Fernkommandos verkuerzen Reaktionszeiten.</text>
  <text x="990" y="1154" class="box-text">Auditierbarkeit durch Queue IDs, Zeitstempel und Lifecycle-Historien.</text>

  <!-- Flows -->
  <path d="M364 318 H386" class="flow"/>
  <path d="M692 318 H714" class="flow"/>
  <path d="M984 318 H1006" class="flow"/>
  <path d="M1320 318 H1342" class="flow"/>

  <path d="M354 506 H376" class="flow"/>
  <path d="M688 506 H710" class="flow"/>
  <path d="M996 506 H1018" class="flow"/>
  <path d="M1292 506 H1314" class="flow"/>

  <path d="M374 700 H396" class="flow"/>
  <path d="M708 700 H730" class="flow"/>
  <path d="M1036 700 H1058" class="flow"/>
  <path d="M1406 700 H1428" class="flow"/>

  <path d="M360 900 H382" class="flow"/>
  <path d="M682 900 H704" class="flow"/>
  <path d="M1016 900 H1038" class="flow"/>
  <path d="M1338 900 H1360" class="flow"/>

  <path d="M1820 364 V456" class="flow-soft"/>
  <path d="M1820 558 V648" class="flow-soft"/>
  <path d="M1820 758 V846" class="flow-soft"/>
  <path d="M1820 974 V1062" class="flow-soft"/>

  <!-- Callouts with explanations -->
  <rect x="1470" y="224" width="372" height="90" class="callout"/>
  <text x="1486" y="248" class="callout-title">[E1] Warum 202 statt synchron?</text>
  <text x="1486" y="268" class="callout-text">Kurze Antwortzeit fuer Agenten,</text>
  <text x="1486" y="286" class="callout-text">Verarbeitung entkoppelt im Worker.</text>
  <path d="M1470 268 H1408" class="flow-soft"/>

  <rect x="1470" y="420" width="372" height="94" class="callout"/>
  <text x="1486" y="444" class="callout-title">[E2] Queue Telemetrie Zweck</text>
  <text x="1486" y="464" class="callout-text">queue_wait_ms und end_to_end_ms</text>
  <text x="1486" y="482" class="callout-text">zeigen Lastspitzen und Latenztrends.</text>
  <path d="M1470 466 H1448" class="flow-soft"/>

  <rect x="74" y="606" width="342" height="94" class="callout"/>
  <text x="90" y="630" class="callout-title">[E3] host_uid Pruning Logik</text>
  <text x="90" y="650" class="callout-text">Pruning folgt Identitaet statt nur Hostname,</text>
  <text x="90" y="668" class="callout-text">verhindert Split-Host Ueberschneidungen.</text>
  <path d="M416 654 H468" class="flow-soft"/>

  <rect x="1450" y="792" width="392" height="96" class="callout"/>
  <text x="1466" y="816" class="callout-title">[E4] Mail + OAuth Koppelung</text>
  <text x="1466" y="836" class="callout-text">OAuth Zustand steuert Versandfaehigkeit;</text>
  <text x="1466" y="854" class="callout-text">Fallbacks verhindern stille Zustellfehler.</text>
  <path d="M1450 840 H1398" class="flow-soft"/>

  <!-- Dimension lines like technical drawing -->
  <path d="M74 256 V236 H1842 V256" class="dim"/>
  <text x="896" y="232" class="dim-text">PROCESS BAND WIDTH = 1768 px</text>

  <path d="M1858 270 H1878 V1218 H1858" class="dim"/>
  <text x="1678" y="1240" class="dim-text">FLOW STACK HEIGHT = 948 px</text>

  <path d="M74 356 V382" class="dim"/>
  <text x="90" y="378" class="dim-text">A-LAYER</text>

  <!-- Footer -->
  <text x="46" y="1264" class="legend">Asset: docs/processes/business-illustration-blueprint-technical.svg | Blueprint/Technical style | 2026-05-25</text>
</svg>
