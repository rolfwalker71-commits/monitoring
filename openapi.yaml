      operationId: getOauthMicrosoftCallback
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string }
        - name: state
          in: query
          required: false
          schema: { type: string }
        - name: error
          in: query
          required: false
          schema: { type: string }
      responses:
        '302':
          description: Redirect to dashboard after login

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: monitoring_session
      description: Session cookie set by /api/v1/web-login
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: >-
        Agent/server API key header. Depending on server grace mode,
        known hosts may be temporarily allowed without this key.
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 200
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
        maximum: 500000
  responses:
    ErrorBadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: invalid json }
    ErrorUnauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: unauthorized }
  schemas:
    SessionStatus:
      type: object
      properties:
        authenticated: { type: boolean, example: true }
        username: { type: string, nullable: true, example: admin }
        is_admin: { type: boolean, example: true }
    HostSettings:
      type: object
      properties:
        hostname: { type: string, example: support01 }
        display_name_override: { type: string, example: Support Server }
        country_code_override: { type: string, example: AT }
        is_favorite: { type: boolean, example: true }
        is_hidden: { type: boolean, example: false }
    HostCard:
      type: object
      properties:
        hostname: { type: string, example: support01 }
        display_name: { type: string, example: ANG AT Supportserver }
        last_seen_utc: { type: string, format: date-time }
        report_count: { type: integer, example: 170 }
        primary_ip: { type: string, example: 192.168.90.52 }
        agent_id: { type: string, example: linux-01 }
        agent_version: { type: string, example: 0.5.26 }
        delivery_mode: { type: string, enum: [live, delayed], example: live }
        is_delayed: { type: boolean, example: false }
        queue_depth: { type: integer, example: 0 }
        open_alert_count: { type: integer, example: 0 }
        open_critical_alert_count: { type: integer, example: 0 }
        os: { type: string, example: Linux }
        country_code: { type: string, example: AT }
        is_favorite: { type: boolean, example: true }
        is_hidden: { type: boolean, example: false }
        agent_api_key_status:
          type: string
          enum: [key-auth, grace, configured, missing, off]
          example: key-auth
    ReportListItem:
      type: object
      properties:
        id: { type: integer, example: 12345 }
        received_at_utc: { type: string, format: date-time }
        agent_id: { type: string, example: linux-01 }
        hostname: { type: string, example: support01 }
        primary_ip: { type: string, example: 192.168.90.52 }
        delivery_mode: { type: string, enum: [live, delayed], example: live }
        display_name: { type: string, example: ANG AT Supportserver }
        payload:
          type: object
          additionalProperties: true
    Alert:
      type: object
      properties:
        id: { type: integer, example: 987 }
        hostname: { type: string, example: support01 }
        display_name: { type: string, example: ANG AT Supportserver }
        mountpoint: { type: string, example: /data }
        severity: { type: string, enum: [warning, critical], example: warning }
        used_percent: { type: number, example: 81.3 }
        status: { type: string, enum: [open, resolved], example: open }
        created_at_utc: { type: string, format: date-time }
        last_seen_at_utc: { type: string, format: date-time }
        resolved_at_utc: { type: string, format: date-time, nullable: true }
        report_id: { type: integer, example: 12345 }
        is_muted: { type: boolean, example: false }
        is_acknowledged: { type: boolean, example: false }
        is_closed: { type: boolean, example: false }
        acknowledged_by: { type: string, nullable: true, example: admin }
        closed_by: { type: string, nullable: true, example: admin }
        acknowledged_at_utc: { type: string, format: date-time, nullable: true }
        closed_at_utc: { type: string, format: date-time, nullable: true }
    AlertSubscription:
      type: object
      properties:
        hostname: { type: string, example: support01 }
        display_name: { type: string, example: ANG AT Supportserver }
        notify_mail: { type: boolean, example: true }
        notify_telegram: { type: boolean, example: false }
        updated_at_utc: { type: string, format: date-time }
    AlertSubscriptionInput:
      type: object
      required: [hostname]
      properties:
        hostname: { type: string, example: support01 }
        notify_mail: { type: boolean, example: true }
        notify_telegram: { type: boolean, example: false }
    AlertHostRef:
      type: object
      properties:
        hostname: { type: string, example: support01 }
        display_name: { type: string, example: ANG AT Supportserver }
